services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: triologue-postgres
    environment:
      POSTGRES_DB: triologue
      POSTGRES_USER: triologue_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simple_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - triologue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triologue_user -d triologue"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: triologue-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - triologue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API Server
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: triologue-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://triologue_user:${POSTGRES_PASSWORD:-simple_password_123}@postgres:5432/triologue
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      CLIENT_URL: ${CLIENT_URL:-https://agent-control.duckdns.org/triologue}
      CLAWDBOT_API_URL: ${CLAWDBOT_API_URL:-http://localhost:8080}
      ICE_WEBHOOK_URL: ${ICE_WEBHOOK_URL}
    ports:
      - "4001:3001"
    networks:
      - triologue-network
      - agent-control-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./server/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.triologue-api.rule=Host(`agent-control.duckdns.org`) && PathPrefix(`/triologue/api`)
      - traefik.http.routers.triologue-api.entrypoints=web,websecure
      - traefik.http.routers.triologue-api.tls=true
      - traefik.http.routers.triologue-api.tls.certresolver=letsencrypt
      - traefik.http.services.triologue-api.loadbalancer.server.port=3001
      - traefik.http.routers.triologue-api.middlewares=triologue-api-stripprefix
      - traefik.http.middlewares.triologue-api-stripprefix.stripprefix.prefixes=/triologue/api

  # Frontend React App
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://agent-control.duckdns.org/triologue/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-https://agent-control.duckdns.org/triologue/api}
    container_name: triologue-frontend
    ports:
      - "4000:80"
    networks:
      - triologue-network
      - agent-control-network
    depends_on:
      - api
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.triologue-frontend.rule=Host(`agent-control.duckdns.org`) && PathPrefix(`/triologue`)
      - traefik.http.routers.triologue-frontend.entrypoints=web,websecure
      - traefik.http.routers.triologue-frontend.tls=true
      - traefik.http.routers.triologue-frontend.tls.certresolver=letsencrypt
      - traefik.http.services.triologue-frontend.loadbalancer.server.port=80

networks:
  triologue-network:
    driver: bridge
  agent-control-network:
    external: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local