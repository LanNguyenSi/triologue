name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: triologue_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the gitleaks step can scan every commit.
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          # Repo has three lockfile trees; key the cache off all of them.
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Scan for secrets (gitleaks)
        env:
          GITLEAKS_VERSION: "8.21.2"
          GITLEAKS_SHA256: "5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
        run: |
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source=. --config=.gitleaks.toml --no-banner --redact

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Type check client
        working-directory: ./client
        run: npx tsc --noEmit

      - name: Type check server
        working-directory: ./server
        run: npx tsc --noEmit

      - name: Type check server tests
        working-directory: ./server
        run: npx tsc --noEmit -p tsconfig.test.json

      - name: Lint client
        working-directory: ./client
        run: npm run lint

      - name: Lint server
        working-directory: ./server
        run: npm run lint

      - name: Test client
        working-directory: ./client
        run: npx vitest run

      - name: Prepare test database
        working-directory: ./server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/triologue_test
        run: npx prisma db push --skip-generate

      - name: Test server
        working-directory: ./server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/triologue_test
          RUN_DB_TESTS: "1"
        # Serial: the DB-backed suites share one database and would race on each
        # other's beforeAll cleanup if run in parallel workers.
        # --coverage enforces per-file thresholds defined in jest.config.js for
        # the CRIT+HIGH security files (test/triologue-coverage-routes).
        run: npm test -- --runInBand --coverage

      - name: Build client
        working-directory: ./client
        run: npm run build

      - name: Build server
        working-directory: ./server
        run: npm run build
