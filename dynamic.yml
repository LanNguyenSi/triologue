# Traefik dynamic configuration for Triologue - security and CORS
http:
  middlewares:
    # Security headers middleware
    security-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - OPTIONS
          - PUT
          - POST
          - DELETE
          - PATCH
        accessControlAllowOriginList:
          - https://triologue.duckdns.org
          - https://api.triologue.duckdns.org
          - http://localhost:4000
          - ws://localhost:4001
          - wss://api.triologue.duckdns.org
        accessControlAllowHeaders:
          - "Authorization"
          - "Content-Type"
          - "X-Requested-With"
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https

    # Rate limiting middleware  
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1m

    # WebSocket/Socket.io optimized middleware
    websocket-headers:
      headers:
        accessControlAllowOriginList:
          - https://triologue.duckdns.org
          - https://api.triologue.duckdns.org
          - http://localhost:4000
        customRequestHeaders:
          X-Forwarded-Proto: https
          Connection: upgrade
          Upgrade: websocket
        accessControlAllowCredentials: true

# TLS options for enhanced security
tls:
  options:
    default:
      minVersion: "VersionTLS12"
      maxVersion: "VersionTLS13"
      cipherSuites:
        - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"
        - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
        - "TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256"