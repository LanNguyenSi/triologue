id: jira
name: Atlassian Jira
provider: atlassian
icon: 📋
category: project-management

auth:
  type: oauth2
  provider: atlassian
  scope: jira
  requiredScopes:
    - read:jira-work
    - write:jira-work

actions:
  - id: jira.listIssues
    name: List Issues
    description: Listet Jira Issues in einem Projekt auf
    riskLevel: low
    requiresApproval: false
    method: GET
    urlTemplate: "https://api.atlassian.com/ex/jira/{{cloudId}}/rest/api/3/search?jql=project={{projectKey}}&maxResults=50"
    input:
      type: object
      properties:
        cloudId:
          type: string
          required: true
        projectKey:
          type: string
          required: true

  - id: jira.getIssue
    name: Get Issue
    description: Liest ein einzelnes Jira Issue
    riskLevel: low
    requiresApproval: false
    method: GET
    urlTemplate: "https://api.atlassian.com/ex/jira/{{cloudId}}/rest/api/3/issue/{{issueKey}}"
    input:
      type: object
      properties:
        cloudId:
          type: string
          required: true
        issueKey:
          type: string
          required: true

  - id: jira.createIssue
    name: Create Issue
    description: Erstellt ein neues Jira Issue
    riskLevel: medium
    requiresApproval: true
    method: POST
    urlTemplate: "https://api.atlassian.com/ex/jira/{{cloudId}}/rest/api/3/issue"
    input:
      type: object
      properties:
        cloudId:
          type: string
          required: true
        projectKey:
          type: string
          required: true
        summary:
          type: string
          required: true
        description:
          type: string
        issueType:
          type: string
          default: Task

  - id: jira.updateIssue
    name: Update Issue
    description: Aktualisiert ein bestehendes Jira Issue
    riskLevel: low
    requiresApproval: false
    method: PUT
    urlTemplate: "https://api.atlassian.com/ex/jira/{{cloudId}}/rest/api/3/issue/{{issueKey}}"
    input:
      type: object
      properties:
        cloudId:
          type: string
          required: true
        issueKey:
          type: string
          required: true
        summary:
          type: string
        description:
          type: string
        status:
          type: string
