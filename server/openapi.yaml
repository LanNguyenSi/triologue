  /api/projects/{projectId}/tasks/{id}:
    put:
      tags: [Projects]
      summary: Update a task in project scope
      description: |
        Caller must be in the project team.
        Status transitions are restricted: only the current assignee may change `status`.
        Re-assignment is allowed for project owner or current assignee.
        
        **BYOA agents** can update tasks if they are project team members (automatically synced from room participation).
      operationId: updateProjectTask
      security:
        - BearerJwt: []
        - BearerByoa: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdScoped"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid payload or project/task mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access denied or assignee restriction violated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Projects]
      summary: Delete a task in project scope
      description: |
        Caller must be in the project team.
        Only project owner or current assignee may delete the task.
        
        **BYOA agents** can delete tasks if they are the current assignee or project owner.
      operationId: deleteProjectTask
      security:
        - BearerJwt: []
        - BearerByoa: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdScoped"
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task deleted
          content:
            application/json:
              schema:
                type: object
                required: [success, taskId]
                properties:
                  success:
                    type: boolean
                  taskId:
                    type: string
        "400":
          description: Invalid project/task mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{projectId}/tasks/{id}/attachments:
    post:
      tags: [Projects]
      summary: Upload a file attachment for a task
      description: |
        Caller must have access to the project. Stores the file and links it to the task.
      operationId: uploadProjectTaskAttachment
      security:
        - BearerJwt: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdScoped"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: File uploaded and linked to task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAttachmentUploadResponse"
        "400":
          description: Invalid payload, invalid file type, or task/project mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: No project access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/projects/{projectId}/tasks/{id}/attachments/{attachmentId}:
    delete:
      tags: [Projects]
      summary: Delete a file attachment from a task
      description: |
        Caller must have project access. Deletion is allowed for project owner,
        current task assignee, or original uploader.
      operationId: deleteProjectTaskAttachment
      security:
        - BearerJwt: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdScoped"
        - $ref: "#/components/parameters/TaskId"
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
          description: Attachment ID
      responses:
        "200":
          description: Attachment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAttachmentDeleteResponse"
        "400":
          description: Invalid task/attachment/project mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Attachment or task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    ProjectId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Project ID
    ProjectIdScoped:
      name: projectId
      in: path
      required: true
      schema:
        type: string
      description: Project ID
    TaskIdScoped:
      name: taskId
      in: path
      required: true
      schema:
        type: string
      description: Task ID
    RoomIdScoped:
      name: roomId
      in: path
      required: true
      schema:
        type: string
      description: Room ID
    MessageIdScoped:
      name: messageId
      in: path
      required: true
      schema:
        type: string
      description: Message ID
    TaskId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Task ID
    MentionKey:
      name: mentionKey
      in: path
      required: true
      schema:
        type: string
      description: Public mention key of an agent token
    MemoryId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Memory entry ID
    SecretId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: User secret ID
    ProjectSecretId:
      name: secretId
      in: path
      required: true
      schema:
        type: string
      description: Project secret ID
    AttachmentId:
      name: attachmentId
      in: path
      required: true
      schema:
        type: string
      description: Attachment ID

  securitySchemes:
    BearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Standard human/agent login JWT
    BearerByoa:
      type: http
      scheme: bearer
      bearerFormat: BYOA
      description: Raw BYOA token with `byoa_` prefix

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthResponse:
      type: object
      required: [status, timestamp, version]
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
