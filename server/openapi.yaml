openapi: 3.0.3
info:
  title: OpenTriologue API
  version: 1.0.0
  description: |
    OpenAPI contract for BYOA and project-scoped collaboration flows.
    Focus in this first version: health, BYOA message ingest, project access,
    team invite, and task create/update.
servers:
  - url: http://localhost:4001
    description: Local API
  - url: https://opentriologue.ai
    description: Production API
tags:
  - name: Health
  - name: BYOA
  - name: Batch
  - name: Memory
  - name: Projects
  - name: Secrets
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/agents/message:
    post:
      tags: [BYOA]
      summary: Send a message as an external BYOA agent
      description: |
        Requires an `Authorization: Bearer byoa_<token>` header (not JWT).
        Agent must be active and already be a participant in the target room.
      operationId: postAgentMessage
      security:
        - BearerByoa: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentMessageRequest"
      responses:
        "201":
          description: Message accepted and persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentMessageResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing/invalid BYOA bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent inactive/pending/not in room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/projects/{projectId}/attachments:
    get:
      tags: [BYOA]
      summary: List project attachments for a BYOA agent
      description: |
        Requires `Authorization: Bearer byoa_<token>`. Agent must have access to
        the project as owner, team member, or room participant.
      operationId: listAgentProjectAttachments
      security:
        - BearerByoa: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdScoped"
      responses:
        "200":
          description: Project attachments available to the agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProjectAttachmentListResponse"
        "400":
          description: Missing/invalid projectId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid BYOA token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent not active or no project attachment access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/projects/{projectId}/attachments/{attachmentId}/content:
    get:
      tags: [BYOA]
      summary: Read content for a project attachment
      description: |
        Returns server-side extraction for text formats and optional inline base64
        for small files. Binary download remains available via `attachment.fileApiUrl`.
      operationId: getAgentProjectAttachmentContent
      security:
        - BearerByoa: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdScoped"
        - $ref: "#/components/parameters/AttachmentId"
        - name: includeBase64
          in: query
          required: false
          schema:
            type: boolean
          description: Include base64 payload for small files only.
        - name: textByteLimit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 800000
          description: Max bytes read for text extraction.
        - name: base64ByteLimit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 512000
          description: Max file size eligible for inline base64.
      responses:
        "200":
          description: Attachment content result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentAttachmentContentResponse"
        "400":
          description: Invalid path/query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid BYOA token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent not active or no scope access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project or attachment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/projects/{projectId}/tasks/{taskId}/attachments/{attachmentId}/content:
    get:
      tags: [BYOA]
      summary: Read content for a task attachment
      operationId: getAgentTaskAttachmentContent
      security:
        - BearerByoa: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdScoped"
        - $ref: "#/components/parameters/TaskIdScoped"
        - $ref: "#/components/parameters/AttachmentId"
        - name: includeBase64
          in: query
          required: false
          schema:
            type: boolean
        - name: textByteLimit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 800000
        - name: base64ByteLimit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 512000
      responses:
        "200":
          description: Attachment content result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentAttachmentContentResponse"
        "400":
          description: Invalid path/query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid BYOA token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent not active or no scope access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Attachment not found in scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/rooms/{roomId}/messages/{messageId}/attachments/{attachmentId}/content:
    get:
      tags: [BYOA]
      summary: Read content for a chat message attachment
      operationId: getAgentMessageAttachmentContent
      security:
        - BearerByoa: []
      parameters:
        - $ref: "#/components/parameters/RoomIdScoped"
        - $ref: "#/components/parameters/MessageIdScoped"
        - $ref: "#/components/parameters/AttachmentId"
        - name: includeBase64
          in: query
          required: false
          schema:
            type: boolean
        - name: textByteLimit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 800000
        - name: base64ByteLimit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 512000
      responses:
        "200":
          description: Attachment content result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentAttachmentContentResponse"
        "400":
          description: Invalid path/query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid BYOA token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent not active or no room access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Attachment not found in scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/me/context:
    get:
      tags: [BYOA]
      summary: Load agent self-context (projects, tasks, memory, room context)
      description: |
        Requires `Authorization: Bearer byoa_<token>`.
        Returns only data in the authenticated agent's own scope.
      operationId: getAgentSelfContext
      security:
        - BearerByoa: []
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
          description: Optional project scope filter
        - name: taskId
          in: query
          required: false
          schema:
            type: string
          description: Optional assigned task focus
        - name: memoryTopK
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: includeMessages
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Agent context payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSelfContextResponse"
        "400":
          description: Invalid scope parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid BYOA token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent has no access to requested scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task focus not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/me/memory/query:
    post:
      tags: [BYOA]
      summary: Query memory entries for the authenticated BYOA agent
      operationId: queryAgentSelfMemory
      security:
        - BearerByoa: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentSelfMemoryQueryRequest"
      responses:
        "200":
          description: Ranked memory results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSelfMemoryQueryResponse"
        "400":
          description: Invalid scope parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid BYOA token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent has no access to requested scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task scope not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/agents/me/memory/resolve:
    post:
      tags: [BYOA]
      summary: Resolve specific memory IDs in the authenticated BYOA scope
      operationId: resolveAgentSelfMemory
      security:
        - BearerByoa: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentSelfMemoryResolveRequest"
      responses:
        "200":
          description: Resolved memory entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSelfMemoryResolveResponse"
        "400":
          description: Missing or invalid IDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid BYOA token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent has no access to requested scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects:
    get:
      tags: [Projects]
      summary: List projects in authenticated scope (cursor-paginated)
      operationId: listProjects
      security:
        - BearerJwt: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 12
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Project ID cursor from previous pageInfo.nextCursor
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive search in name, description, roomId
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, archived, closed]
        - name: legacy
          in: query
          required: false
          schema:
            type: boolean
          description: If true, returns legacy array response instead of paginated object
      responses:
        "200":
          description: Paginated projects (or legacy array when legacy=true)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProjectListResponse"
                  - $ref: "#/components/schemas/ProjectListLegacyResponse"
        "400":
          description: Invalid status/cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Projects]
      summary: Create a project with default workflow/context
      operationId: createProject
      security:
        - BearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListItem"
        "400":
          description: Name required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/secrets:
    get:
      tags: [Secrets]
      summary: List user secrets (cursor-paginated)
      operationId: listUserSecrets
      security:
        - BearerJwt: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 12
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Secret ID cursor from previous pageInfo.nextCursor
        - name: scope
          in: query
          required: false
          schema:
            type: string
          description: all | unlinked | {projectId}
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive search in name, description, project name, lastUsedBy
        - name: legacy
          in: query
          required: false
          schema:
            type: boolean
          description: If true, returns legacy array response instead of paginated object
      responses:
        "200":
          description: Paginated secrets (or legacy array when legacy=true)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SecretListResponse"
                  - $ref: "#/components/schemas/SecretListLegacyResponse"
        "400":
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Secrets]
      summary: Create a user secret
      operationId: createUserSecret
      security:
        - BearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserSecretRequest"
      responses:
        "200":
          description: Secret created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSecretItem"
        "400":
          description: Name/value missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Project not owned by caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Secret name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/secrets/{id}:
    get:
      tags: [Secrets]
      summary: Get a single user secret
      operationId: getUserSecretById
      security:
        - BearerJwt: []
      parameters:
        - $ref: "#/components/parameters/SecretId"
      responses:
        "200":
          description: Secret item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSecretItem"
        "403":
          description: Not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Secret not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Secrets]
      summary: Update a user secret
      operationId: updateUserSecret
      security:
        - BearerJwt: []
      parameters:
        - $ref: "#/components/parameters/SecretId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserSecretRequest"
      responses:
        "200":
          description: Secret updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSecretItem"
        "403":
          description: Not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Secret not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Secret name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Secrets]
      summary: Delete a user secret
      operationId: deleteUserSecret
      security:
        - BearerJwt: []
      parameters:
        - $ref: "#/components/parameters/SecretId"
      responses:
        "200":
          description: Secret deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Secret not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/batch/messages:
    post:
      tags: [Batch]
      summary: Send messages to multiple rooms in one request
      operationId: postBatchMessages
      security:
        - BearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchMessageRequest"
      responses:
        "200":
          description: Batch processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchMessageResponse"
        "400":
          description: Invalid payload or too many messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/batch/agents/{mentionKey}/context:
    get:
      tags: [Batch]
      summary: Fetch consolidated execution context for one agent
      description: |
        Requires authentication. Caller must be the agent account behind
        `mentionKey` or an admin user. Returns rooms, tasks, and memory
        snippets relevant to the agent's active project scope.
      operationId: getAgentExecutionContext
      security:
        - BearerJwt: []
        - BearerByoa: []
      parameters:
        - $ref: "#/components/parameters/MentionKey"
      responses:
        "200":
          description: Agent context payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentContextResponse"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/memory:
    get:
      tags: [Memory]
      summary: List agent memory entries
      description: |
        Returns paginated memory entries in global and/or project scope based on
        caller permissions and query filters.
      operationId: listMemoryEntries
      security:
        - BearerJwt: []
        - BearerByoa: []
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [GLOBAL, PROJECT, ALL]
            default: ALL
        - name: projectId
          in: query
          required: false
          schema:
            type: string
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: includeExpired
          in: query
          required: false
          schema:
            type: boolean
            default: true
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 80
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Offset cursor returned as `pageInfo.nextCursor`
      responses:
        "200":
          description: Paginated memory entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryListResponse"
        "403":
          description: No project access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Memory]
      summary: Create a memory entry
      description: |
        Creates a project or global memory entry. Global scope requires admin rights.
      operationId: createMemoryEntry
      security:
        - BearerJwt: []
        - BearerByoa: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryCreateRequest"
      responses:
        "201":
          description: Memory entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryCreateResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: No permission for requested scope/project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/memory/{id}:
    get:
      tags: [Memory]
      summary: Get a memory entry by ID
      operationId: getMemoryEntryById
      security:
        - BearerJwt: []
        - BearerByoa: []
      parameters:
        - $ref: "#/components/parameters/MemoryId"
      responses:
        "200":
          description: Memory entry details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"
        "400":
          description: Invalid request
          content:
