services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: triologue-postgres
    env_file:
      - .env.ice
    environment:
      POSTGRES_DB: triologue
      POSTGRES_USER: triologue_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      triologue-network:
        aliases:
          - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triologue_user -d triologue"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: triologue-redis
    volumes:
      - redis_data:/data
    networks:
      triologue-network:
        aliases:
          - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: triologue-api
    env_file:
      - .env.ice
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://triologue_user:${POSTGRES_PASSWORD}@postgres:5432/triologue
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ICE_TOKEN: ${ICE_TOKEN}
      LAVA_TOKEN: ${LAVA_TOKEN}
      CLIENT_URL: https://triologue.duckdns.org
      CORS_ORIGIN: https://triologue.duckdns.org
    ports:
      - "4001:3001"
    networks:
      - triologue-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./server/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React App (includes nginx with SSL)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://triologue.duckdns.org/api
        VITE_SOCKET_URL: https://triologue.duckdns.org
    container_name: triologue-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - triologue-network
    depends_on:
      - api
    restart: unless-stopped

networks:
  triologue-network:
    driver: bridge
    name: triologue-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_data:
    external: true
    name: triologue_certbot_data
  certbot_www:
    external: true
    name: triologue_certbot_www
