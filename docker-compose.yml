services:
  postgres:
    image: postgres:15-alpine
    container_name: triologue-postgres
    environment:
      POSTGRES_DB: triologue
      POSTGRES_USER: triologue_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      triologue-network:
        aliases:
          - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triologue_user -d triologue"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: triologue-redis
    volumes:
      - redis_data:/data
    networks:
      triologue-network:
        aliases:
          - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: triologue-api
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://triologue_user:${POSTGRES_PASSWORD}@postgres:5432/triologue
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ICE_TOKEN: ${ICE_TOKEN}
      LAVA_TOKEN: ${LAVA_TOKEN}
      CLIENT_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4001:3001"
    networks:
      - triologue-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./server/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: /
    container_name: triologue-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./client/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/opentriologue.ai:/etc/letsencrypt/live/opentriologue.ai:ro
      - /etc/letsencrypt/archive/opentriologue.ai:/etc/letsencrypt/archive/opentriologue.ai:ro
    networks:
      - triologue-network
    depends_on:
      - api
    restart: unless-stopped

  # Phase 6: Matrix Server (Conduit)
  conduit:
    image: matrixconduit/matrix-conduit:latest
    container_name: conduit
    ports:
      - "8448:8008"
    environment:
      CONDUIT_CONFIG: /etc/conduit/conduit.toml
    volumes:
      - ./conduit.toml:/etc/conduit/conduit.toml:ro
      - conduit_data:/var/lib/conduit
    networks:
      - triologue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/_matrix/client/versions"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  triologue-network:
    driver: bridge
    name: triologue-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  conduit_data:
    driver: local
