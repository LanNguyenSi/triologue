###############################################################################
# OpenTriologue — docker-compose.yml
#
# Single source of truth for all environments.
# Usage:
#   make up          (production — VPS)
#   make dev         (local development)
#   make backup      (pg_dump before any deploy)
#   make deploy      (backup + rebuild + restart)
#
# ⚠️  NEVER run `docker compose down -v` — this deletes the database!
###############################################################################

services:
  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: triologue-postgres
    environment:
      POSTGRES_DB: triologue
      POSTGRES_USER: triologue_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups                        # pg_dump target
    networks:
      triologue-network:
        aliases: [postgres]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triologue_user -d triologue"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Cache ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: triologue-redis
    volumes:
      - redis_data:/data
    networks:
      triologue-network:
        aliases: [redis]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: triologue-api
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://triologue_user:${POSTGRES_PASSWORD}@postgres:5432/triologue
      REDIS_URL: redis://redis:6379
    ports:
      - "4001:3001"
    networks:
      - triologue-network
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped
    volumes:
      - ./server/uploads:/app/uploads
      - api_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend (Nginx) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: /
    container_name: triologue-frontend
    # No port mapping - Traefik handles SSL termination
    volumes:
      - ./nginx/traefik.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - triologue-network
      - traefik
    depends_on: [api]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.triologue.rule=Host(`opentriologue.ai`) || Host(`www.opentriologue.ai`)"
      - "traefik.http.routers.triologue.entrypoints=websecure"
      - "traefik.http.routers.triologue.tls=true"
      - "traefik.http.routers.triologue.tls.certresolver=letsencrypt"
      - "traefik.http.services.triologue.loadbalancer.server.port=80"

networks:
  triologue-network:
    driver: bridge
    name: triologue-network
  traefik:
    external: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_data:
    driver: local
