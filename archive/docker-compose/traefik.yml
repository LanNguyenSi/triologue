# Traefik static configuration for Triologue system
api:
  dashboard: true
  insecure: true  # For debugging only

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entrypoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
  file:
    filename: /etc/traefik/dynamic.yml

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@triologue.duckdns.org
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: web

# Logging for debugging
log:
  level: INFO
  
accessLog: {}

# Enable metrics (optional)
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true