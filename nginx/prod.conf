# ── HTTP redirect to HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name opentriologue.ai www.opentriologue.ai;
    return 301 https://$server_name$request_uri;
}

# ── HTTPS main server ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name opentriologue.ai;

    # SSL certificates
    ssl_certificate     /etc/letsencrypt/live/opentriologue.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opentriologue.ai/privkey.pem;

    # SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;

    # Frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # HTML files - never cache (to get latest asset references)
    location ~ \.html$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "Thu, 01 Jan 1970 00:00:00 GMT";
    }

    # Assets (JS/CSS with hash) - cache aggressively (hash changes on update)
    location ~ \.(js|css|woff|woff2|ttf|svg|ico|png|jpg|jpeg|gif|webp)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API proxy
    location /api/ {
        proxy_pass http://triologue-api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Socket.io WebSocket
    location /socket.io/ {
        proxy_pass http://triologue-api:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 10;
        proxy_buffering off;
    }

    # Uploads
    location /uploads/ {
        proxy_pass http://triologue-api:3001/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # BYOA Agent Gateway — WebSocket proxy (wss://opentriologue.ai/byoa/ws)
    location /byoa/ {
        proxy_pass http://172.17.0.1:9500/byoa/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # BYOA Agent Gateway — REST (health, send)
    location /gateway/ {
        proxy_pass http://172.17.0.1:9500/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Redirect www to non-www ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.opentriologue.ai;

    ssl_certificate     /etc/letsencrypt/live/opentriologue.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opentriologue.ai/privkey.pem;

    return 301 https://opentriologue.ai$request_uri;
}
